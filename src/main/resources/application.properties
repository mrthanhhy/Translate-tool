# ==================== Ollama API Configuration ====================
# Host Ollama (dùng localhost hoặc ngrok URL)
ollama.host=${OLLAMA_HOST:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}

# ==================== Hotkey Configuration ====================
# Hotkey: Ctrl+Alt+T (ASCII value: 256 for Ctrl, 160 for Alt+T)
# Format: {modifier_key}+{char_code}
hotkey.modifier=256+160
hotkey.enabled=true

# ==================== Hotkey Modifier Keys ====================
# Modifier key constants:
# - Control: 1 (hoặc 256)
# - Alt: 16 (hoặc 1)
# - Shift: 32 (hoặc 0)
# - Meta: 64 (hoặc 2)
# Ví dụ: Ctrl+Alt+T = 1+16+84 = 101
#        Ctrl+Shift+A = 1+32+65 = 98
