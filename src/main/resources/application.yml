spring:
  application:
    name: translate-tool
  jackson:
    serialization:
      write-durations-as-timestamps: false

# Ollama API Configuration
# Sử dụng biến môi trường, nếu chưa có thì dùng giá trị mặc định
ollama:
  host: ${OLLAMA_HOST:https://chery-unnatural-collinearly.ngrok-free.dev}
  model: ${OLLAMA_MODEL:spTranl}

# Hotkey Configuration
hotkey:
  enabled: ${HOTKEY_ENABLED:true}
  config: ${HOTKEY_CONFIG:256+160}
  description: "${HOTKEY_DESCRIPTION:Ctrl+Alt+T}"

# Logger configuration
logging:
  level:
    root: INFO
    com.translate: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Application settings
app:
  name: Translate Tool
  version: 1.0.0-SNAPSHOT
